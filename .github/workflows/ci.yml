name: CI

on:
  push:
    branches:
      - feature/github-actions

jobs:
  lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/set-up-python@v5
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check .
      
      - name: Run Black
        run: black --check .

      - name: Run Pytest
        run: python3 -m pytest
